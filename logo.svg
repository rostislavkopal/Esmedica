<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Pozadí -->
  <rect width="320" height="80" rx="8" fill="#0c5898"/>

  <!-- Symbol: srdce z dlaní + kříž + kaduceus -->
  <g transform="translate(14, 8)" fill="white">
    <!-- Kříž nahoře -->
    <rect x="28" y="0" width="5" height="14" rx="1.5"/>
    <rect x="23" y="4" width="15" height="5" rx="1.5"/>

    <!-- Levá dlaň / ruka -->
    <path d="M10 38 C6 30 4 24 8 18 C11 13 16 15 18 20 C19 17 21 14 25 15 C29 16 29 20 28 23 C30 20 33 19 35 22 C37 25 35 29 33 32 L30 50 C28 56 22 60 18 58 C14 56 10 50 10 44 Z" opacity="0.9"/>
    <!-- Desní dlaň / ruka (zrcadlo) -->
    <path d="M51 38 C55 30 57 24 53 18 C50 13 45 15 43 20 C42 17 40 14 36 15 C32 16 32 20 33 23 C31 20 28 19 26 22 C24 25 26 29 28 32 L31 50 C33 56 39 60 43 58 C47 56 51 50 51 44 Z" opacity="0.9"/>

    <!-- Hůl kaducea (střed) -->
    <rect x="29" y="14" width="3" height="32" rx="1.5"/>

    <!-- Had - levá smyčka -->
    <path d="M30.5 18 C24 20 22 26 26 30 C30 34 30.5 36 30.5 36" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Had - pravá smyčka -->
    <path d="M30.5 22 C37 24 39 30 35 34 C31 38 30.5 40 30.5 40" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- Křídla nahoře -->
    <path d="M30.5 16 C26 13 20 14 18 17" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M30.5 16 C35 13 41 14 43 17" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text ESMEDICA -->
  <text x="84" y="50" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="28" letter-spacing="3" fill="white">ESMEDICA</text>
</svg>
