<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Návrhy tlačítka objednání</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#0891b2',
            'brand-dark': '#0e7490',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen py-12 px-4">

  <div class="max-w-lg mx-auto space-y-12">

    <h1 class="text-xl font-bold text-gray-800 text-center">Návrhy tlačítka objednání</h1>

    <!-- NÁVRH 1 — Dvě části: ikona vlevo + text, logo vpravo na bílém poli -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Návrh 1 — Logo vpravo</p>
      <a href="#"
        style="background: #0891b2; transition: background 0.15s, transform 0.15s;"
        onmouseover="this.style.background='#0e7490';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.background='#0891b2';this.style.transform='translateY(0)'"
        class="flex items-center text-white rounded-xl shadow-md w-full overflow-hidden">
        <!-- Ikona vlevo -->
        <div class="flex items-center justify-center self-stretch bg-white/10 px-5">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 14l2 2 4-4"/>
          </svg>
        </div>
        <!-- Text střed -->
        <div class="flex-1 py-4 px-4">
          <span class="text-lg font-bold leading-tight block">Objednejte se online</span>
          <span class="text-white/70 text-xs mt-0.5 block">přes rezervační systém</span>
        </div>
        <!-- Logo vpravo -->
        <div class="flex items-center self-stretch bg-white px-4">
          <img src="https://umsousercontent.com/lib_VIqzMBqtfUYwExIq/vgWNiFkBtjVmMJug.svg?w=180&dpr=2"
            alt="Medevio" class="h-5 w-auto">
        </div>
      </a>
    </div>

    <!-- NÁVRH 2 — Velké tlačítko se dvěma řádky a logem pod textem, přes celou šířku -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Návrh 2 — Minimalistický s akcenty</p>
      <a href="#"
        class="group relative flex flex-col items-center justify-center text-white rounded-2xl shadow-lg w-full py-6 px-6 overflow-hidden"
        style="background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%); transition: transform 0.15s;"
        onmouseover="this.style.transform='translateY(-2px)'"
        onmouseout="this.style.transform='translateY(0)'">
        <!-- Dekorativní kruh v pozadí -->
        <div class="absolute right-[-20px] top-[-20px] w-32 h-32 rounded-full bg-white/5"></div>
        <div class="absolute right-[20px] bottom-[-30px] w-20 h-20 rounded-full bg-white/5"></div>
        <span class="text-2xl font-bold tracking-tight relative z-10">Objednejte se online</span>
        <div class="mt-3 flex items-center gap-2 relative z-10">
          <div class="bg-white rounded-lg px-3 py-1 shadow-sm">
            <img src="https://umsousercontent.com/lib_VIqzMBqtfUYwExIq/vgWNiFkBtjVmMJug.svg?w=180&dpr=2"
              alt="Medevio" class="h-4 w-auto">
          </div>
          <svg class="w-5 h-5 text-white/70 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </a>
    </div>

    <!-- NÁVRH 3 — Outline / světlý na bílém pozadí s brand akcentem -->
    <div>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Návrh 3 — Světlý s tučným akcentem</p>
      <a href="#"
        class="group flex items-center gap-4 bg-white border-2 border-brand rounded-xl px-5 py-4 shadow-sm w-full"
        style="transition: box-shadow 0.15s, transform 0.15s;"
        onmouseover="this.style.boxShadow='0 4px 20px rgba(8,145,178,0.2)';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.boxShadow='';this.style.transform='translateY(0)'">
        <!-- Ikona -->
        <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#0891b2;">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 14l2 2 4-4"/>
          </svg>
        </div>
        <!-- Text -->
        <div class="flex flex-col flex-1 gap-1.5">
          <span class="text-lg font-bold text-gray-900 leading-tight">Objednejte se online</span>
          <div class="flex items-center gap-1.5">
            <span class="text-xs text-gray-400">přes</span>
            <img src="https://umsousercontent.com/lib_VIqzMBqtfUYwExIq/vgWNiFkBtjVmMJug.svg?w=180&dpr=2"
              alt="Medevio" class="h-3.5 w-auto">
          </div>
        </div>
        <!-- Šipka -->
        <svg class="w-5 h-5 text-brand group-hover:translate-x-1 transition-transform flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <p class="text-center text-xs text-gray-400 pt-4">← <a href="mapa.html" class="underline">Zpět na novou verzi</a></p>

  </div>
</body>
</html>
